build:
  gpu: true
  python_version: "3.10"
  system_packages:
    - "ffmpeg"
    - "wget"
    - "git"
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
  python_packages:
    - "torch==2.0.1"
    - "torchvision==0.15.2"
    - "opencv-python==4.10.0.84"
    - "numpy==1.26.4"
    - "pillow>=10.2.0"
    - "scipy==1.13.1"
    - "cog==0.9.0"
    - "onnxruntime-gpu==1.18.0"
    - "imageio==2.34.2"
    - "imageio-ffmpeg==0.5.1"
    - "pyyaml==6.0.1"
    - "tqdm==4.66.4"
    - "rich==13.7.1"
    - "ffmpeg-python==0.2.0"
    - "onnx==1.16.1"
    - "scikit-image==0.24.0"
    - "albumentations==1.4.10"
    - "matplotlib==3.9.0"
    - "tyro==0.8.5"
    - "pykalman==0.9.7"
    - "transformers==4.38.0"
    - "lmdb==1.4.1"
    - "gradio==5.1.0"
    - "huggingface_hub[cli]"
  run:
    - huggingface-cli download KlingTeam/LivePortrait --local-dir pretrained_weights --exclude "*.git*" "README.md" "docs"
    - mkdir -p pretrained_weights/insightface/models/buffalo_l && wget -q -O /tmp/buffalo_l.zip https://github.com/deepinsight/insightface/releases/download/v0.7/buffalo_l.zip && unzip -qo /tmp/buffalo_l.zip -d pretrained_weights/insightface/models/buffalo_l/ && rm /tmp/buffalo_l.zip
predict: "predict.py:Predictor"
